<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">Ahmed Khan tenant profile image</title>
  <desc id="desc">A simple neutral initials avatar for the tenant profile.</desc>
  <defs>
    <linearGradient id="bg" x1="44" y1="26" x2="198" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7f7f7"/>
      <stop offset="1" stop-color="#dedede"/>
    </linearGradient>
    <linearGradient id="ring" x1="50" y1="24" x2="192" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity=".84"/>
      <stop offset="1" stop-color="#bdbdbd" stop-opacity=".72"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity=".08"/>
    </filter>
  </defs>
  <circle cx="120" cy="120" r="112" fill="url(#bg)" filter="url(#softShadow)"/>
  <circle cx="120" cy="120" r="111" fill="none" stroke="url(#ring)" stroke-width="2"/>
  <circle cx="120" cy="120" r="80" fill="#ffffff" opacity=".46"/>
  <text
    x="120"
    y="123"
    fill="#303030"
    dominant-baseline="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif"
    font-size="82"
    font-weight="600"
    letter-spacing=".8"
    text-anchor="middle">AK</text>
</svg>
